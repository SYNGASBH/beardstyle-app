    <path d="M195,155 Q200,160 205,155 Q210,160 215,155"/>
    <path d="M225,155 Q230,160 235,155 Q240,160 245,155"/>

    <path d="M140,170 Q145,175 150,170 Q155,175 160,170"/>
    <path d="M170,175 Q175,180 180,175 Q185,180 190,175"/>
    <path d="M200,175 Q205,180 210,175 Q215,180 220,175"/>
    <path d="M230,170 Q235,175 240,170 Q245,175 250,170"/>

    <path d="M145,190 Q150,195 155,190 Q160,195 165,190"/>
    <path d="M175,195 Q180,200 185,195 Q190,200 195,195"/>
    <path d="M205,195 Q210,200 215,195 Q220,200 225,195"/>
    <path d="M235,190 Q240,195 245,190 Q250,195 255,190"/>

    <!-- Lower beard -->
    <path d="M155,210 Q160,215 165,210 Q170,215 175,210"/>
    <path d="M185,215 Q190,220 195,215 Q200,220 205,215"/>
    <path d="M215,210 Q220,215 225,210 Q230,215 235,210"/>

    <path d="M165,230 Q170,235 175,230 Q180,235 185,230"/>
    <path d="M195,230 Q200,235 205,230 Q210,235 215,230"/>
